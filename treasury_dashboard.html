<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treasury Rates Dashboard</title>
  <style>
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #122033;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .title-wrap h1 {
      margin: 0;
      font-size: 2rem;
    }
    .title-wrap p {
      margin: 6px 0 0;
      color: #52627a;
    }
    .refresh-btn {
      background: #0f6fff;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(18, 32, 51, 0.08);
      padding: 18px;
      margin-bottom: 18px;
    }
    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .pill.success { background: #e7f7ee; color: #158347; }
    .pill.warning { background: #fff7db; color: #a96b00; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid #e7eaf3;
    }
    th {
      font-size: 0.85rem;
      color: #617089;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    td:last-child {
      font-weight: 700;
      color: #0d1b2a;
    }
    .muted {
      color: #617089;
    }
    @media (max-width: 640px) {
      .top-bar { flex-direction: column; align-items: flex-start; }
      th, td { padding: 10px 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div class="title-wrap">
        <h1>Treasury Rates Dashboard</h1>
        <p>
          Source:
          <strong>PostgreSQL treasury_yields</strong>
        </p>
      </div>
      <button class="refresh-btn" onclick="refreshData()">Refresh data</button>
    </div>

    <div class="card">
      <div class="status-row">
        <span id="status-pill" class="pill warning">Checking data freshness…</span>
        <span id="status-text" class="muted">Loading latest treasury information.</span>
      </div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Maturity</th>
            <th>Observation Date</th>
            <th>Yield (%)</th>
          </tr>
        </thead>
        <tbody id="rates-body">
          <tr>
            <td colspan="3" class="muted">No data loaded yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_BASE = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
      ? 'http://127.0.0.1:8000'
      : '';

    async function fetchJson(url) {
      const response = await fetch(`${API_BASE}${url}`);
      if (!response.ok) {
        throw new Error(`Request failed: ${response.status}`);
      }
      return response.json();
    }

    function setStatus(ready, text) {
      const pill = document.getElementById('status-pill');
      const statusText = document.getElementById('status-text');
      pill.className = `pill ${ready ? 'success' : 'warning'}`;
      pill.textContent = ready ? 'Data is current' : 'Refreshing data';
      statusText.textContent = text;
    }

    function renderRateRows(data) {
      const tbody = document.getElementById('rates-body');
      tbody.innerHTML = '';

      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="muted">No data available.</td></tr>';
        return;
      }

      for (const row of data) {
        tbody.innerHTML += `
          <tr>
            <td>${row.maturity}</td>
            <td>${row.observation_date}</td>
            <td>${Number(row.yield_value).toFixed(4)}</td>
          </tr>
        `;
      }
    }

    async function loadData() {
      try {
        const status = await fetchJson('/api/rates/status');
        setStatus(
          status.up_to_date,
          `Latest PostgreSQL record: ${status.latest_observation_date || 'not available'}`
        );

        const rates = await fetchJson('/api/rates/latest');
        renderRateRows(rates);
      } catch (error) {
        setStatus(false, error.message);
        document.getElementById('rates-body').innerHTML = '<tr><td colspan="3" class="muted">Unable to load data.</td></tr>';
      }
    }

    async function refreshData() {
      try {
        setStatus(false, 'Refreshing treasury data from the source…');
        const ingestResponse = await fetch(`${API_BASE}/ingest`, { method: 'POST' });
        if (!ingestResponse.ok) {
          throw new Error('Unable to refresh data');
        }
        await loadData();
      } catch (error) {
        setStatus(false, error.message);
      }
    }

    loadData();
  </script>
</body>
</html>
